version: "3.9"

services:
  ingestion:
    build:
      context: ./services/ingestion
      dockerfile: Dockerfile
    container_name: raksh-ingestion
    restart: unless-stopped
    ports:
      - "8001:8001"
    env_file:
      - .env
    volumes:
      - ./watch:/watch
      - type: bind
        source: ./gcp-creds.json
        target: /run/secrets/gcp-creds.json
        read_only: true
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: "2.0"
        reservations:
          memory: 1G
          cpus: "0.5"
    networks:
      - raksh-network

  nginx:
    image: nginx:alpine
    container_name: raksh-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      ingestion:
        condition: service_healthy
    networks:
      - raksh-network

  orthanc:
    image: jodogne/orthanc:latest
    container_name: raksh-orthanc
    restart: unless-stopped
    ports:
      - "8042:8042"
      - "4242:4242"
    volumes:
      - orthanc-data:/var/lib/orthanc/db
    environment:
      ORTHANC__REGISTERED_USERS: '{"raksh": "orthanc-secret"}'
    networks:
      - raksh-network

volumes:
  orthanc-data:

networks:
  raksh-network:
    driver: bridge

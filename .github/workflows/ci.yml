name: raksh-ci

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install ruff mypy
          pip install -r services/ingestion/requirements.txt

      - name: Lint with ruff
        run: ruff check services/ingestion/ --config pyproject.toml

      - name: Type check with mypy
        run: mypy services/ingestion/ --ignore-missing-imports --no-strict-optional
        continue-on-error: true

  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y tesseract-ocr tesseract-ocr-hin libgl1-mesa-glx libglib2.0-0

      - name: Install Python dependencies
        run: pip install -r services/ingestion/requirements.txt

      - name: Run unit tests
        working-directory: services/ingestion
        run: python -m pytest tests/ -v --tb=short --junitxml=../../test-results.xml
        env:
          SUPABASE_URL: http://localhost:54321
          SUPABASE_SERVICE_ROLE_KEY: test-key
          INGESTION_API_KEY: test-key

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results.xml

  docker-build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build ingestion image
        run: |
          docker build -t raksh-ingestion:ci ./services/ingestion
          docker images raksh-ingestion:ci

      - name: Verify container starts
        run: |
          docker run -d --name raksh-test \
            -e SUPABASE_URL=http://localhost:54321 \
            -e SUPABASE_SERVICE_ROLE_KEY=test-key \
            -e INGESTION_API_KEY=test-key \
            -p 8001:8001 \
            raksh-ingestion:ci
          sleep 5
          curl --retry 3 --retry-delay 2 http://localhost:8001/health
          docker logs raksh-test
          docker stop raksh-test

  security-scan:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install safety
        run: pip install safety

      - name: Check dependencies for vulnerabilities
        run: safety check -r services/ingestion/requirements.txt
        continue-on-error: true

      - name: Check for secrets in code
        run: |
          pip install detect-secrets
          detect-secrets scan --all-files --baseline .secrets.baseline || true
